services:
  grub-loader:
    build: .
    container_name: grub-loader
    environment:
      DATA_DIR: /data
      FALLBACK_ALIAS: ubuntu
    ports:
      - "8086:8086"
    volumes:
      - ./data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8086/healthz', timeout=2)"]
      interval: 20s
      timeout: 5s
      retries: 3
      start_period: 10s
